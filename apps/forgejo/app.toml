[app]
name = "forgejo"
title = "Forgejo"
description = "Self-hosted Git forge with issues, pull requests, CI/CD, and package registry."
repo_url = "https://github.com/imbue-openhost/openhost-forgejo"
website_url = "https://forgejo.org"
docs_url = "https://github.com/imbue-openhost/openhost-forgejo#readme"
tags = ["git", "code", "ci-cd", "forge"]
categories = ["development", "git"]

[integration]
level = 2
summary = "Owner has to create a local Forgejo account on first use; no zone-auth auto-login yet."
has = [
    "respects_data_dirs",
    "no_internal_tls",
    "persists_secrets",
]
missing = [
    "zone_owner_auto_login",
    "non_owner_redirect_to_zone",
    "oauth_broker",
]
not_applicable = [
    "media_ports_in_range",
    "cross_app_secrets",
    "sqlite_provisioned",
    "federated_guest_identity",
    "exposes_cross_app_service",
]
