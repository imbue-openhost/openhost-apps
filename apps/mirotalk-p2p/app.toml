[app]
name = "mirotalk-p2p"
title = "MiroTalk P2P"
description = "Open-source WebRTC video conferencing where browsers connect peer-to-peer for real-time audio and video; the server only handles signaling, never media. Includes screen sharing, chat, a collaborative whiteboard, and file sharing."
repo_url = "https://github.com/imbue-openhost/openhost-mirotalk-p2p"
website_url = "https://github.com/miroslavpejic85/mirotalk"
docs_url = "https://github.com/imbue-openhost/openhost-mirotalk-p2p#readme"
tags = ["video", "conferencing", "webrtc", "p2p", "meetings"]
categories = ["networking", "privacy"]

openhost_integration_score = 4
openhost_integration_score_explanation = "Zone owner is auto-logged in as host; guests join via the room URL. Signaling-only, no media stored."
