[app]
name = "navidrome"
title = "Navidrome"
description = "Modern music server and streamer compatible with Subsonic/Airsonic clients."
repo_url = "https://github.com/imbue-openhost/openhost-navidrome"
website_url = "https://www.navidrome.org"
docs_url = "https://github.com/imbue-openhost/openhost-navidrome#readme"
tags = ["music", "streaming", "media"]
categories = ["media", "music"]

[integration]
level = 2
summary = "Owner creates a local Navidrome account on first use; no zone-auth auto-login yet."
has = [
    "respects_data_dirs",
    "no_internal_tls",
    "persists_secrets",
]
missing = [
    "zone_owner_auto_login",
    "non_owner_redirect_to_zone",
]
not_applicable = [
    "media_ports_in_range",
    "oauth_broker",
    "cross_app_secrets",
    "sqlite_provisioned",
    "federated_guest_identity",
    "exposes_cross_app_service",
]
