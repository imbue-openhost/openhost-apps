# OpenHost integration vocabulary.
#
# Each key names one kind of integration friction that an app can
# either resolve, leave unresolved, or mark as not applicable.
#
# app.toml references these keys in [integration].has / .missing /
# .not_applicable. generate.py validates that every key referenced
# in an app.toml is defined here.
#
# Adding a new key: define it here, document in which cases it
# applies, and backfill every app.toml to sort it into has,
# missing, or not_applicable. CI fails if any app is silent about
# a key defined here.

[respects_data_dirs]
title = "Data directories"
description = "App writes all state to OPENHOST_APP_DATA_DIR and OPENHOST_APP_TEMP_DIR, not arbitrary container paths."

[no_internal_tls]
title = "No internal TLS"
description = "App serves plain HTTP inside the container and lets OpenHost handle TLS."

[persists_secrets]
title = "Secrets persist across restarts"
description = "Auto-generated secrets are stored in app data and re-used on restart, not regenerated each boot."

[zone_owner_auto_login]
title = "Zone-owner auto-login"
description = "Owner's zone_auth cookie is verified at the app layer; they are not asked for a separate app-level password."

[non_owner_redirect_to_zone]
title = "Non-owner redirect to zone login"
description = "Browsers without a valid zone_auth cookie are sent to the zone login page instead of the app's native login UI."

[media_ports_in_range]
title = "Media ports in OpenHost range"
description = "Any media or peer ports the app needs are bound to the 9000-9999 range OpenHost publishes."

[oauth_broker]
title = "OAuth broker"
description = "App fetches third-party OAuth tokens from /_services/secrets/oauth/token rather than asking the user to paste an API key."

[cross_app_secrets]
title = "Cross-app secrets"
description = "Secrets shared with other apps on the zone are stored in and retrieved from the secrets service."

[sqlite_provisioned]
title = "SQLite provisioned by OpenHost"
description = "App reads its database path from OPENHOST_SQLITE_* rather than managing its own sqlite file."

[federated_guest_identity]
title = "Federated guest identity"
description = "Accepts signed identity tokens from other OpenHost zones so their owners can sign in as guests."

[exposes_cross_app_service]
title = "Exposes a cross-app service"
description = "Registers itself via /_services/ so other apps on the same zone can consume it."
