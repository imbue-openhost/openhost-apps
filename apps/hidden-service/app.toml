[app]
name = "hidden-service"
title = "Tor Hidden Service"
description = "Tor hidden service with a simple page editor CMS."
repo_url = "https://github.com/imbue-openhost/openhost-hidden-service"
website_url = "https://github.com/imbue-openhost/openhost-hidden-service"
docs_url = "https://github.com/imbue-openhost/openhost-hidden-service#readme"
tags = ["tor", "privacy", "onion", "cms"]
categories = ["privacy", "tools"]

[integration]
level = 5
summary = "Owner-only admin (gated at router); no native login, nothing to shim."
has = [
    "respects_data_dirs",
    "no_internal_tls",
    "persists_secrets",
]
missing = []
not_applicable = [
    "zone_owner_auto_login",
    "non_owner_redirect_to_zone",
    "media_ports_in_range",
    "oauth_broker",
    "cross_app_secrets",
    "sqlite_provisioned",
    "federated_guest_identity",
    "exposes_cross_app_service",
]
