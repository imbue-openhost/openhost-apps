website_url = "https://pi-hole.net"
docs_url = "https://github.com/imbue-openhost/openhost-pihole#readme"
tags = ["dns", "ad-blocker", "privacy", "network"]
categories = ["networking", "privacy", "productivity"]

openhost_integration_score = 3
openhost_integration_score_explanation = "Zone owner is auto-logged in to the admin dashboard, but the generated admin password is stored in plaintext on disk where other apps could read it."
