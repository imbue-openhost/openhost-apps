[app]
name = "uptime-kuma"
title = "Uptime Kuma"
description = "Self-hosted uptime monitoring with HTTP, TCP, DNS, and ping checks plus status pages."
repo_url = "https://github.com/imbue-openhost/openhost-uptime-kuma"
website_url = "https://uptime.kuma.pet"
docs_url = "https://github.com/imbue-openhost/openhost-uptime-kuma#readme"
tags = ["monitoring", "uptime", "status"]
categories = ["monitoring", "tools"]

[integration]
level = 2
summary = "Owner steps through Uptime Kuma's first-run setup wizard to create a local account; no zone-auth auto-login yet."
has = [
    "respects_data_dirs",
    "no_internal_tls",
    "persists_secrets",
]
missing = [
    "zone_owner_auto_login",
    "non_owner_redirect_to_zone",
]
not_applicable = [
    "media_ports_in_range",
    "oauth_broker",
    "cross_app_secrets",
    "sqlite_provisioned",
    "federated_guest_identity",
    "exposes_cross_app_service",
]
