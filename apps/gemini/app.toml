[app]
name = "gemini"
title = "Gemini"
description = "Agate-based Gemini protocol server for hosting a capsule of static text documents, browsable with any Gemini client over TLS on the protocol's standard port 1965."
repo_url = "https://github.com/imbue-openhost/openhost-gemini"
website_url = "https://geminiprotocol.net"
docs_url = "https://github.com/imbue-openhost/openhost-gemini#readme"
tags = ["gemini", "smolnet", "tls", "capsule"]
categories = ["networking", "publishing"]

openhost_integration_score = 4
openhost_integration_score_explanation = "Owner is auto-logged into the gemtext editor and guests get the public landing page; the Gemini capsule itself is public by protocol on port 1965."
