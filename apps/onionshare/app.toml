[app]
name = "onionshare"
title = "OnionShare"
description = "Anonymously share files, host a website, or run a chat room over Tor hidden services."
repo_url = "https://github.com/imbue-openhost/openhost-onionshare"
website_url = "https://onionshare.org"
docs_url = "https://github.com/imbue-openhost/openhost-onionshare#readme"
tags = ["tor", "privacy", "onion", "file-sharing"]
