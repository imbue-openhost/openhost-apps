[app]
name = "oura-connector"
title = "Oura Connector"
description = "Imports, stores, and displays personal health data from Oura smart rings — including sleep, activity, and readiness metrics — and exposes the collected data through an API for other apps."
repo_url = "https://github.com/imbue-openhost/openhost-oura-ring"
website_url = "https://github.com/imbue-openhost/openhost-oura-ring"
docs_url = "https://github.com/imbue-openhost/openhost-oura-ring#readme"
tags = ["oura", "fitness", "data"]
categories = ["utility", "data-liberation"]

openhost_integration_score = 2
openhost_integration_score_explanation = "Runs and persists data correctly, but there is no OpenHost SSO; access relies on the router gating the app, and the OAuth setup page is not owner-checked in-app."