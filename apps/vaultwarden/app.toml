[app]
name = "vaultwarden"
title = "VaultWarden"
description = "An alternative, open-source password manager server written in Rust that implements the Bitwarden API and works with the official Bitwarden client apps."
repo_url = "https://github.com/imbue-openhost/openhost-vaultwarden"
website_url = "https://github.com/dani-garcia/vaultwarden"
docs_url = "https://github.com/imbue-openhost/openhost-vaultwarden#readme"
tags = ["passwords", "privacy", "bitwarden"]
categories = ["privacy", "utility"]

openhost_integration_score = 2
openhost_integration_score_explanation = "Runs and persists data correctly, but there is no OpenHost SSO; the owner signs in through Vaultwarden's own email and master-password login form."
